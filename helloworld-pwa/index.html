<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 700;
      letter-spacing: -2px;
      animation: fadeIn 0.8s ease forwards;
    }

    h1 span { color: #ff4500; }

    p.sub {
      font-size: 0.85rem;
      color: #666;
      text-align: center;
      animation: fadeIn 1.2s ease forwards;
    }

    .counter-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeIn 1.4s ease forwards;
    }

    .count {
      font-size: 5rem;
      font-weight: 700;
      color: #ff4500;
      transition: transform 0.1s ease;
    }

    .count.bump { transform: scale(1.3); }

    button {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      background: #ff4500;
      color: #fff;
      border: none;
      padding: 0.8rem 2.5rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:active { background: #cc3700; }

    .stored-note {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <h1>Hello <span>World</span></h1>
  <p class="sub">PWA test · données stockées localement pour toujours</p>

  <div class="counter-box">
    <div class="count" id="count">0</div>
    <button onclick="increment()">Tap me</button>
  </div>

  <p class="stored-note" id="note">Chargement…</p>

  <script>
    // IndexedDB setup
    let db;
    const DB_NAME = 'helloworld_db';
    const STORE = 'kv';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          e.target.result.createObjectStore(STORE);
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e);
      });
    }

    async function getVal(key) {
      const tx = db.transaction(STORE, 'readonly');
      return new Promise(res => {
        const req = tx.objectStore(STORE).get(key);
        req.onsuccess = () => res(req.result ?? 0);
      });
    }

    async function setVal(key, val) {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(val, key);
    }

    // App logic
    let count = 0;

    async function increment() {
      count++;
      await setVal('count', count);
      render();
      const el = document.getElementById('count');
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 150);
    }

    function render() {
      document.getElementById('count').textContent = count;
      document.getElementById('note').textContent =
        `Valeur sauvegardée dans IndexedDB · survivra aux redémarrages`;
    }

    // Init
    openDB().then(async d => {
      db = d;
      count = await getVal('count');
      render();
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
